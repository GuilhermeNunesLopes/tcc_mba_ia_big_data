events {}
http {
    server {
        listen 80;
        location / {
            # Tenta passar para a 'api' na porta 5000
            proxy_pass http://api:5000;
            proxy_set_header Host $host;
            
            # Aumenta os limites para não dar timeout tão cedo
            proxy_connect_timeout 10s;
            proxy_read_timeout 10s;
        }
    }
}